helmDefaults:
  wait: true
  waitForJobs: true
  timeout: 1200
  cleanupOnFail: true

repositories:
  - name: nfs-subdir-external-provisioner
    url: https://kubernetes-sigs.github.io/nfs-subdir-external-provisioner

  - name: metallb
    url: https://metallb.github.io/metallb

  - name: cert-manager
    url: https://charts.jetstack.io

  - name: traefik
    url: https://traefik.github.io/charts

  - name: hashicorp
    url: https://helm.releases.hashicorp.com

  - name: metrics-server
    url: https://kubernetes-sigs.github.io/metrics-server/

  - name: prometheus-community
    url: https://prometheus-community.github.io/helm-charts

  - name: kedacore
    url: https://kedacore.github.io/charts

  - name: argo
    url: https://argoproj.github.io/argo-helm

  - name: gitlab
    url: https://charts.gitlab.io

  - name: romm-helm-chart
    url: https://henriqzimer.github.io/romm-helm-chart

releases:
  - name: nfs-subdir-external-provisioner
    namespace: storage
    createNamespace: true
    chart: nfs-subdir-external-provisioner/nfs-subdir-external-provisioner
    version: 4.0.18
    values:
      - storage/nfs-subdir-external-provisioner/values.yaml

  - name: hashicorp-vault
    namespace: secrets
    createNamespace: true
    chart: hashicorp/vault
    version: 0.32.0
    needs:
      - storage/nfs-subdir-external-provisioner
    values:
      - secrets/hashicorp-vault/values.yaml
    hooks:
      - events: ["presync"]
        showlogs: true
        command: "./scripts/ensure-vault-postgres-secret.sh"

  - name: vault-secrets-operator
    namespace: secrets
    createNamespace: true
    chart: hashicorp/vault-secrets-operator
    version: 1.4.0
    needs:
      - secrets/hashicorp-vault
    values:
      - secrets/vault-secrets-operator/values.yaml
    hooks:
      - &applyManifestsHook
        events: ["postsync"]
        showlogs: true
        command: "./scripts/apply-manifests.sh"
        args: ["secrets/vault-secrets-operator/manifests"]
      - events: ["postsync"]
        showlogs: true
        command: "./scripts/apply-vault-auths.sh"
      - events: ["postsync"]
        showlogs: true
        command: "./scripts/seed-vault-secrets.sh"

  - name: metallb
    namespace: networking
    createNamespace: true
    chart: metallb/metallb
    version: 0.15.3
    values:
      - networking/metallb/values.yaml
    hooks:
      - events: ["presync"]
        showlogs: true
        command: "./scripts/ensure-namespaces.sh"
      - <<: *applyManifestsHook
        args: ["networking/metallb/manifests"]

  - name: cert-manager
    namespace: networking
    createNamespace: true
    chart: cert-manager/cert-manager
    version: 1.20.2
    needs:
      - secrets/vault-secrets-operator
    values:
      - networking/cert-manager/values.yaml
    hooks:
      - <<: *applyManifestsHook
        args: ["networking/cert-manager/manifests", "--wait-secrets"]

  - name: traefik
    namespace: networking
    createNamespace: true
    chart: traefik/traefik
    version: 40.2.0
    needs:
      - networking/metallb
      - networking/cert-manager
    values:
      - networking/traefik/values.yaml

  - name: proxmox-cloud-controller-manager
    chart: oci://ghcr.io/sergelogvinov/charts/proxmox-cloud-controller-manager
    version: 0.2.28
    namespace: kube-system
    needs:
      - secrets/vault-secrets-operator
    values:
      - scheduling/proxmox-cloud-controller-manager/values.yaml
    hooks:
      - <<: *applyManifestsHook
        events: ["presync"]
        args: ["scheduling/proxmox-cloud-controller-manager/manifests", "--wait-secrets"]

  - name: karpenter-provider-proxmox
    namespace: kube-system
    createNamespace: true
    wait: false
    chart: oci://ghcr.io/sergelogvinov/charts/karpenter-provider-proxmox
    version: 0.4.7
    needs:
      - secrets/vault-secrets-operator
    values:
      - scheduling/karpenter-provider-proxmox/values.yaml
    hooks:
      - <<: *applyManifestsHook
        events: ["presync"]
        args: ["scheduling/karpenter-provider-proxmox/manifests", "--wait-secrets"]

  - name: metrics-server
    namespace: kube-system
    createNamespace: true
    chart: metrics-server/metrics-server
    version: 3.13.0
    values:
      - monitoring/metrics-server/values.yaml

  - name: kube-prometheus-stack
    namespace: monitoring
    createNamespace: true
    chart: prometheus-community/kube-prometheus-stack
    version: 85.1.3
    needs:
      - secrets/vault-secrets-operator
      - storage/nfs-subdir-external-provisioner
    values:
      - monitoring/kube-prometheus-stack/values.yaml
    hooks:
      - <<: *applyManifestsHook
        events: ["presync"]
        args: ["monitoring/kube-prometheus-stack/manifests", "--wait-secrets"]

  - name: keda
    namespace: scheduling
    createNamespace: true
    chart: kedacore/keda
    version: 2.19.0
    values:
      - scheduling/keda/values.yaml

  - name: portainer
    namespace: monitoring
    createNamespace: true
    chart: portainer/portainer
    version: 239.2.0
    needs:
      - secrets/vault-secrets-operator
      - storage/nfs-subdir-external-provisioner
    values:
      - monitoring/portainer/values.yaml
    hooks:
      - <<: *applyManifestsHook
        events: ["presync"]
        args: ["monitoring/portainer/manifests", "--wait-secrets"]

  - name: argo-cd
    namespace: development
    createNamespace: true
    chart: argo/argo-cd
    version: 9.5.14
    needs:
      - secrets/vault-secrets-operator
    values:
      - development/argo-cd/values.yaml
    hooks:
      - <<: *applyManifestsHook
        events: ["presync"]
        args: ["development/argo-cd/manifests", "--wait-secrets"]

  - name: gitlab-runner
    namespace: development
    createNamespace: true
    chart: gitlab/gitlab-runner
    version: 0.88.3
    needs:
      - secrets/vault-secrets-operator
    values:
      - development/gitlab-runner/values.yaml
    hooks:
      - <<: *applyManifestsHook
        events: ["presync"]
        args: ["development/gitlab-runner/manifests", "--wait-secrets"]

  - name: k6-operator
    namespace: development
    createNamespace: true
    chart: grafana/k6-operator
    version: 4.4.1
    values:
      - development/k6-operator/values.yaml

  - name: n8n
    chart: oci://8gears.container-registry.com/library/n8n
    version: 2.0.1
    namespace: development
    createNamespace: true
    needs:
      - secrets/vault-secrets-operator
    values:
      - development/n8n/values.yaml
    hooks:
      - <<: *applyManifestsHook
        events: ["presync"]
        args: ["development/n8n/manifests", "--wait-secrets"]

  - name: romm
    namespace: gaming
    createNamespace: true
    chart: romm-helm-chart/romm
    version: 1.0.7
    needs:
      - secrets/vault-secrets-operator
    values:
      - gaming/romm/values.yaml
    hooks:
      - <<: *applyManifestsHook
        events: ["presync"]
        args: ["gaming/romm/manifests", "--wait-secrets"]