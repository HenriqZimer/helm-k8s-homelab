repositories:
  - name: nfs-subdir-external-provisioner
    url: https://kubernetes-sigs.github.io/nfs-subdir-external-provisioner

  - name: metallb
    url: https://metallb.github.io/metallb

  - name: cert-manager
    url: https://charts.jetstack.io

  - name: traefik
    url: https://traefik.github.io/charts

  - name: hashicorp
    url: https://helm.releases.hashicorp.com

  - name: metrics-server
    url: https://kubernetes-sigs.github.io/metrics-server/

  - name: prometheus-community
    url: https://prometheus-community.github.io/helm-charts

  - name: kedacore
    url: https://kedacore.github.io/charts

  - name: argo
    url: https://argoproj.github.io/argo-helm

  - name: gitlab
    url: https://charts.gitlab.io
  
  - name: grafana
    url: https://grafana.github.io/helm-charts

releases:
  - name: nfs-subdir-external-provisioner
    namespace: storage
    createNamespace: true
    chart: nfs-subdir-external-provisioner/nfs-subdir-external-provisioner
    version: 4.0.18
    values:
      - storage/nfs-subdir-external-provisioner/values.yaml

  - name: metallb
    namespace: networking
    createNamespace: true
    chart: metallb/metallb
    version: 0.15.3
    values:
      - networking/metallb/values.yaml
    hooks:
      - events: ["postsync"]
        showlogs: true
        command: "kubectl"
        args: ["apply", "-f", "networking/metallb/manifests"]

  - name: cert-manager
    namespace: networking
    createNamespace: true
    chart: cert-manager/cert-manager
    version: 1.20.2
    values:
      - networking/cert-manager/values.yaml
    hooks:
      - events: ["postsync"]
        showlogs: true
        command: "kubectl"
        args: ["apply", "-f", "networking/cert-manager/manifests"]

  - name: traefik
    namespace: networking
    createNamespace: true
    chart: traefik/traefik
    version: 40.2.0
    values:
      - networking/traefik/values.yaml

  - name: karpenter-provider-proxmox
    namespace: kube-system
    createNamespace: true
    chart: oci://ghcr.io/sergelogvinov/charts/karpenter-provider-proxmox
    version: 0.4.7
    values:
      - scheduling/karpenter-provider-proxmox/values.yaml
    hooks:
      - events: ["postsync"]
        showlogs: true
        command: "kubectl"
        args: ["apply", "-f", "scheduling/karpenter-provider-proxmox/manifests"]
    
  - name: proxmox-cloud-controller-manager
    chart: oci://ghcr.io/sergelogvinov/charts/proxmox-cloud-controller-manager
    version: 0.2.28
    namespace: kube-system
    values:
      - scheduling/proxmox-cloud-controller-manager/values.yaml

  - name: hashicorp-vault
    namespace: secrets
    createNamespace: true
    chart: hashicorp/vault
    version: 0.32.0
    values:
      - secrets/hashicorp-vault/values.yaml
    hooks:
      - events: ["postsync"]
        showlogs: true
        command: "kubectl"
        args: ["apply", "-f", "secrets/hashicorp-vault/manifests"]
  
  - name: vault-secrets-operator
    namespace: secrets
    createNamespace: true
    chart: hashicorp/vault-secrets-operator
    version: 1.4.0
    values:
      - secrets/vault-secrets-operator/values.yaml
    hooks:
      - events: ["postsync"]
        showlogs: true
        command: "kubectl"
        args: ["apply", "-f", "secrets/vault-secrets-operator/manifests"]

  - name: metrics-server
    namespace: kube-system
    createNamespace: true
    chart: metrics-server/metrics-server
    version: 3.13.0
    values:
      - monitoring/metrics-server/values.yaml

  - name: kube-prometheus-stack
    namespace: monitoring
    createNamespace: true
    chart: prometheus-community/kube-prometheus-stack
    version: 85.1.3
    values:
      - monitoring/kube-prometheus-stack/values.yaml
    hooks:
      - events: ["postsync"]
        showlogs: true
        command: "kubectl"
        args: ["apply", "-f", "monitoring/kube-prometheus-stack/manifests"]

  - name: keda
    namespace: scheduling
    createNamespace: true
    chart: kedacore/keda
    version: 2.19.0
    values:
      - scheduling/keda/values.yaml

  - name: portainer
    namespace: monitoring
    createNamespace: true
    chart: portainer/portainer
    version: 239.2.0
    values:
      - monitoring/portainer/values.yaml

  - name: argo-cd
    namespace: development
    createNamespace: true
    chart: argo/argo-cd
    version: 9.5.14
    values:
      - development/argo-cd/values.yaml

  - name: gitlab-runner
    namespace: development
    createNamespace: true
    chart: gitlab/gitlab-runner
    version: 0.88.3
    values:
      - development/gitlab-runner/values.yaml
    hooks:
      - events: ["postsync"]
        showlogs: true
        command: "kubectl"
        args: ["apply", "-f", "development/gitlab-runner/manifests"]

