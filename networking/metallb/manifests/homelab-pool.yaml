apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: homelab-pool
  namespace: networking
spec:
  addresses:
    - ${METALLB_ADDRESS_RANGE}
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: homelab-advertisement
  namespace: networking
spec:
  ipAddressPools:
    - homelab-pool
  interfaces:
    - eth0
